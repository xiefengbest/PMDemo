    body {

        background-color: #1a1a1a;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    /* 中间内容滚动区 */
    .app-container {
        width: 100vw;
        height: 100vh;
        background-color: #0a0a0a;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
    }

    /* 中间内容滚动区 */
    .content-main {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding-bottom: 60px;
        -webkit-overflow-scrolling: touch;
    }

    /* 隐藏滚动条 */
    .hide-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }

    /* 壁纸卡片比例 9:18 */
    .wallpaper-card {
        aspect-ratio: 9 / 18;
        width: 160px;
        flex-shrink: 0;
        border-radius: 16px;
        overflow: hidden;
        position: relative;
        background: #111;
    }

    .glass-effect {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);

        padding: 2px 6px;
        border-radius: 4px;
        text-transform: uppercase;
        font-weight: bold;
        color: #000;

    /* 底部导航 */

        backdrop-filter: blur(20px);
        border-top: 1px solid rgba(255,255,255,0.08);
        padding: 10px 20px 25px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 100;
        flex-shrink: 0;
    }

    .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        color: #666;
        cursor: pointer;
    }

    .nav-item.active {
        color: #f59e0b;
    }

    /* 横向滑动容器 */
    .horizontal-scroller {
        display: flex;
        gap: 16px;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
    }

    .horizontal-scroller > div {
        scroll-snap-align: start;
        flex-shrink: 0;
    }

    /* 订阅 Banner 样式 */

        width: 85%;
        height: 140px;
        flex-shrink: 0;
        border-radius: 20px;
        position: relative;
        overflow: hidden;
        scroll-snap-align: center !important;
    }

    .banner-mask {

        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-left: 20px;

<script>
  // 智能滚动处理
  const horizontalContainers = document.querySelectorAll('.horizontal-scroller');

  horizontalContainers.forEach(container => {
      container.addEventListener('wheel', (e) => {
          if (Math.abs(e.deltaY) > Math.abs(e.deltaX) && !e.shiftKey) {
              return;
          }
          if (Math.abs(e.deltaX) > Math.abs(e.deltaY) || e.shiftKey) {
              e.preventDefault();
              container.scrollLeft += (e.deltaX || e.deltaY);
          }
      }, { passive: false });
  });
</script>
