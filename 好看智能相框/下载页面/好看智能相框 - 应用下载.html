<body>
    <div class="container">
        <div class="header">
            <img src="https://hk-h5-cdn.levect.com/static/img/logo1.png" alt="好看智能相框" class="app-icon">

        <!-- 微信蒙版 -->
        <div class="wechat-mask" id="wechatMask">
            <div class="wechat-mask-text">击右上角"..."菜单，选择"在浏览器中打开"</div>
            <div class="wechat-mask-tip">
                <div class="wechat-mask-tip-title">请在浏览器中打开</div>
                <div class="wechat-mask-tip-text">点击右上角"..."菜单，选择"在浏览器中打开"以获得更好的下载体验</div>
            </div>
        </div>

        <div class="content">
            <!-- 功能介绍 -->
            <div class="features">
                <div class="section-title">核心功能</div>
                
                <div class="feature-item">
                    <div class="feature-icon">🖼️</div>
                    <div class="feature-content">
                        <div class="feature-title">本地照片整理</div>
                        <div class="feature-desc">本地AI智能筛选，自动过滤截图和文档，保护隐私</div>
                    </div>
                </div>

                <div class="feature-item">
                    <div class="feature-icon">📱</div>
                    <div class="feature-content">

                    </div>

                <div class="feature-item">
                    <div class="feature-icon">☁️</div>
                    <div class="feature-content">
                        <div class="feature-title">云端相册</div>
                        <div class="feature-desc">照片同步，服务端人物识别和旅程识别，按月份分类浏览</div>
                    </div>
                </div>

                <div class="feature-item">
                    <div class="feature-icon">🛒</div>
                    <div class="feature-content">
                        <div class="feature-title">订阅商城</div>
                        <div class="feature-desc">订阅服务每日更新，一键发送到相框</div>
                    </div>
                </div>
            </div>

            <!-- 下载区域 -->
            <div class="download-section">
                <button class="download-btn" id="downloadBtn">前往App Store下载</button>
            </div>
        </div>

        </div>
    </div>

    <script>
        // 检测是否在微信中打开
        function isWeChat() {
            const ua = navigator.userAgent.toLowerCase();
            return ua.indexOf('micromessenger') !== -1;
        }

        // 检测是否是Android设备
        function isAndroid() {
            const ua = navigator.userAgent.toLowerCase();
            return ua.indexOf('android') !== -1;
        }

        // 检测是否是iOS设备
        function isIOS() {
            const ua = navigator.userAgent.toLowerCase();
            return /iphone|ipad|ipod/.test(ua);
        }

        // 应用包名
        const APP_PACKAGE = 'com.hk.phone_album.mobile';

        // Android设备跳转到应用商店（通用market，fallback到应用宝）
        function openAndroidStore() {
            let hasLeftPage = false;
            
            // 监听页面可见性变化和失去焦点
            const checkLeave = () => { hasLeftPage = true; };
            document.addEventListener('visibilitychange', checkLeave);
            window.addEventListener('blur', checkLeave);
            
            // 先尝试通用market deeplink
            const deeplink = `market://details?id=${APP_PACKAGE}`;
            window.location.href = deeplink;
            
            // 如果2.5秒后页面仍然可见，跳转到应用宝网页版
            setTimeout(() => {
                if (!hasLeftPage) {
                    const webUrl = `https://a.app.qq.com/o/simple.jsp?pkgname=${APP_PACKAGE}`;
                    window.location.href = webUrl;
                }
                document.removeEventListener('visibilitychange', checkLeave);
                window.removeEventListener('blur', checkLeave);
            }, 5000);
        }

        // 跳转到App Store
        function openAppStore() {
            window.location.href = 'https://apps.apple.com/cn/app/%E5%A5%BD%E7%9C%8B%E6%99%BA%E8%83%BD%E7%9B%B8%E6%A1%86/id6756484343';
        }

        // 检测是否需要固定下载按钮
        function checkFixedButton() {
            const downloadSection = document.querySelector('.download-section');
            const container = document.querySelector('.container');
            
            // 检测页面高度是否超出视口
            if (container && downloadSection) {
                const containerHeight = container.offsetHeight;
                const viewportHeight = window.innerHeight;
                
                // 如果内容高度超过视口高度，固定下载按钮
                if (containerHeight > viewportHeight - 40) {
                    downloadSection.classList.add('fixed');
                    // 为内容区域添加底部padding，避免被固定按钮遮挡
                    const content = document.querySelector('.content');
                    if (content) {
                        content.style.paddingBottom = '80px';
                    }
                }
            }
        }

        // 初始化
        function init() {
            const wechatMask = document.getElementById('wechatMask');
            const downloadBtn = document.getElementById('downloadBtn');

            // 如果在微信中打开，显示蒙版
            if (isWeChat()) {
                wechatMask.classList.add('show');
                downloadBtn.textContent = '请在浏览器中打开';
                downloadBtn.onclick = function() {
                    // 提示用户使用浏览器打开
                    alert('请点击右上角"..."菜单，选择"在浏览器中打开"');
                };
                return;
            }

            // 如果在浏览器中打开，根据设备类型自动判断并自动跳转
            if (isAndroid()) {
                // Android设备，统一使用通用market，fallback到应用宝
                downloadBtn.textContent = '前往应用商店下载';
                downloadBtn.onclick = openAndroidStore;
                // 自动跳转
                setTimeout(openAndroidStore, 500);
            } else if (isIOS()) {
                // iOS设备，跳转App Store
                downloadBtn.textContent = '前往App Store下载';
                downloadBtn.onclick = openAppStore;
                // 自动跳转
                setTimeout(openAppStore, 500);
            } else {
                // 其他设备（桌面浏览器等），引导到应用宝，不自动跳转
                downloadBtn.textContent = '前往应用宝下载';
                downloadBtn.onclick = openAndroidStore;
            }

            // 检测是否需要固定下载按钮
            setTimeout(checkFixedButton, 100);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
        
        // 窗口大小改变时重新检测
        window.addEventListener('resize', checkFixedButton);
    </script>
