<body>
    <div class="container">

        <div class="content">
            <!-- 功能介绍 -->
            <div class="features">
                <div class="section-title">核心功能</div>
                
                <div class="feature-item">

            <!-- 下载区域 -->
            <div class="download-section">
                <div class="download-actions">
                    <a class="download-btn" id="primaryBtn" href="javascript:void(0)" role="button">打开App继续</a>

            </div>

        </div>

    <script>
        // 检测是否在微信中打开
        function isWeChat() {
            const ua = navigator.userAgent.toLowerCase();
            return ua.indexOf('micromessenger') !== -1;
        }

        // 检测是否是Android设备
        function isAndroid() {
            const ua = navigator.userAgent.toLowerCase();
            return ua.indexOf('android') !== -1;
        }

        // 检测是否是iOS设备
        function isIOS() {
            const ua = navigator.userAgent.toLowerCase();
            return /iphone|ipad|ipod/.test(ua);
        }

        // 应用包名
        const APP_PACKAGE = 'com.hk.phone_album.mobile';
        const YYB_URL = `https://a.app.qq.com/o/simple.jsp?pkgname=${APP_PACKAGE}`;
        const ANDROID_STORE_FALLBACK_DELAY_MS = 3500;

        function getQueryParam(name) {
            try {
                const url = new URL(window.location.href);
                return url.searchParams.get(name);
            } catch (e) {
                const match = new RegExp(`[?&]${name}=([^&]*)`).exec(window.location.search);
                return match ? decodeURIComponent(match[1]) : null;
            }
        }

        function getCurrentInviteUrl() {
            // 统一用线上地址（避免本地 file:// 测试时形成不可用的 fallback）
            const base = 'https://92-cn.levect.com/frames/download/index.html';
            const qs = window.location.search || '';
            return qs ? `${base}${qs}` : base;
        }

        function setAsJsAction(el, handler) {
            if (!el) return;
            el.setAttribute('href', 'javascript:void(0)');
            el.onclick = function (e) {
                if (e && typeof e.preventDefault === 'function') e.preventDefault();
                handler();
            };
        }

        function setAsLink(el, href) {
            if (!el) return;
            el.setAttribute('href', href);
            el.onclick = null;
        }

        // Android：用户点击时再跳转应用商店（仅 market deeplink，无定时自动二次跳转）
        function openAndroidStore() {
            const deeplink = `market://details?id=${APP_PACKAGE}`;
            window.location.href = deeplink;
        }

        // Android：先尝试 market://，失败则自动跳应用宝
        function openAndroidStoreWithFallback() {
            const deeplink = `market://details?id=${APP_PACKAGE}`;
            let fallbackTimer = null;

            const cleanup = () => {
                if (fallbackTimer) {
                    clearTimeout(fallbackTimer);
                    fallbackTimer = null;
                }
                window.removeEventListener('pagehide', cleanup, true);
                window.removeEventListener('blur', cleanup, true);
                document.removeEventListener('visibilitychange', onVisibilityChange, true);
            };

            const onVisibilityChange = () => {
                // 页面被切到后台，通常表示商店/应用已打开，取消兜底
                if (document.visibilityState === 'hidden') cleanup();
            };

            window.addEventListener('pagehide', cleanup, true);
            window.addEventListener('blur', cleanup, true);
            document.addEventListener('visibilitychange', onVisibilityChange, true);

            // 尝试打开系统商店
            window.location.href = deeplink;

            // 若未切走页面，大概率没拉起商店：自动跳应用宝
            fallbackTimer = setTimeout(() => {
                cleanup();
                window.location.href = YYB_URL;
            }, ANDROID_STORE_FALLBACK_DELAY_MS);
        }

        function openAndroidApp() {
            const inviteUrl = getCurrentInviteUrl();

            // 优先使用 intent:// 强制唤起（多数国产浏览器/Chrome 支持），失败会走 browser_fallback_url
            const fallback = encodeURIComponent(inviteUrl);
            const intentUrl =
                `intent://92-cn.levect.com/frames/download/index.html${window.location.search || ''}` +
                `#Intent;scheme=https;package=${APP_PACKAGE};S.browser_fallback_url=${fallback};end`;

            // 在支持 intent:// 的浏览器中会直接拉起；不支持时通常会忽略并留在当前页
            window.location.href = intentUrl;

            // 二次兜底：如果未安装/被拦截，延迟引导下载（不强制跳，避免误伤已安装但被系统拦截的场景）
            setTimeout(() => {
                // 仅给用户一个可点的下载入口（不自动跳）
                const secondaryBtn = document.getElementById('secondaryBtn');
                if (secondaryBtn) secondaryBtn.focus();
            }, 1200);
        }

        // 跳转到App Store
        function openAppStore() {
            window.location.href = 'https://apps.apple.com/cn/app/%E5%A5%BD%E7%9C%8B%E6%99%BA%E8%83%BD%E7%9B%B8%E6%A1%86/id6756484343';
        }

        function openIOSAppOrStore() {
            const inviteUrl = getCurrentInviteUrl();
            // iOS: 让系统尝试 Universal Links（需要用户点击触发；若未安装/不支持则停留）
            window.location.href = inviteUrl;
            setTimeout(() => {
                // 保守兜底：不自动跳商店，避免已打开 App 又被拉回
                const secondaryBtn = document.getElementById('secondaryBtn');
                if (secondaryBtn) secondaryBtn.focus();
            }, 1200);
        }

        // 检测是否需要固定下载按钮
        function checkFixedButton() {
            const downloadSection = document.querySelector('.download-section');
            const container = document.querySelector('.container');
            
            // 检测页面高度是否超出视口
            if (container && downloadSection) {
                const containerHeight = container.offsetHeight;
                const viewportHeight = window.innerHeight;
                
                // 如果内容高度超过视口高度，固定下载按钮
                if (containerHeight > viewportHeight - 40) {
                    downloadSection.classList.add('fixed');
                    // 为内容区域添加底部padding，避免被固定按钮遮挡
                    const content = document.querySelector('.content');
                    if (content) {
                        content.style.paddingBottom = '80px';
                    }
                }
            }
        }

        // 初始化
        function init() {
            const wechatMask = document.getElementById('wechatMask');
            const primaryBtn = document.getElementById('primaryBtn');
            const secondaryBtn = document.getElementById('secondaryBtn');

            const hasToken = !!getQueryParam('token');

            // 如果在微信中打开，显示蒙版
            if (isWeChat()) {
                wechatMask.classList.add('show');
                primaryBtn.textContent = '请在浏览器中打开';
                setAsJsAction(primaryBtn, function () {
                    // 提示用户使用浏览器打开
                    alert('请点击右上角"..."菜单，选择"在浏览器中打开"');
                });
                secondaryBtn.style.display = 'none';
                return;
            }

            // 如果在浏览器中打开，根据设备类型设置按钮文案与点击跳转（不自动跳转）
            if (isAndroid()) {
                if (hasToken) {
                    // 邀请/任务链路：优先打开App完成流程
                    primaryBtn.textContent = '打开App继续';
                    setAsJsAction(primaryBtn, openAndroidApp);

                    secondaryBtn.textContent = '下载App';
                    setAsJsAction(secondaryBtn, openAndroidStoreWithFallback);
                } else {
                    // 普通下载：优先引导安装
                    primaryBtn.textContent = '下载App';
                    setAsJsAction(primaryBtn, openAndroidStoreWithFallback);

                    secondaryBtn.textContent = '打开App继续';
                    setAsJsAction(secondaryBtn, openAndroidApp);
                }
            } else if (isIOS()) {
                const inviteUrl = getCurrentInviteUrl();
                if (hasToken) {
                    // 邀请/任务链路：优先打开App完成流程
                    primaryBtn.textContent = '打开App继续';
                    // iOS: 用真实链接触发 Universal Links（比 window.location 更稳）
                    setAsLink(primaryBtn, inviteUrl);

                    secondaryBtn.textContent = '前往App Store下载';
                    setAsJsAction(secondaryBtn, openAppStore);
                } else {
                    // 普通下载：优先引导安装
                    primaryBtn.textContent = '前往App Store下载';
                    setAsJsAction(primaryBtn, openAppStore);

                    secondaryBtn.textContent = '打开App继续';
                    // iOS: 用真实链接触发 Universal Links（比 window.location 更稳）
                    setAsLink(secondaryBtn, inviteUrl);
                }
            } else {
                // 其他设备（桌面浏览器等），引导到应用宝，不自动跳转
                primaryBtn.textContent = '下载App';
                setAsJsAction(primaryBtn, openAndroidStore);
                secondaryBtn.style.display = 'none';
            }

            // 检测是否需要固定下载按钮
            setTimeout(checkFixedButton, 100);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
        
        // 窗口大小改变时重新检测
        window.addEventListener('resize', checkFixedButton);
    </script>
