<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>深链邀请 - App端UI模拟</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

        :root { --app-height: 100vh; }
        @supports (height: 100dvh) { :root { --app-height: 100dvh; } }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overscroll-behavior-y: contain;
            background: #f2f2f7;
        }

        #app {
            height: var(--app-height);
            max-height: -webkit-fill-available;
        }

        .scroll-hide::-webkit-scrollbar { display: none; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }

        /* iOS Alert */
        .ios-alert-backdrop {
            position: fixed; inset: 0;
            display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3);
            z-index: 100;
        }
        .ios-alert-backdrop.active { display: flex; }
        .ios-alert {
            width: 270px; border-radius: 14px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            box-shadow: 0 0 0 0.5px rgba(0,0,0,0.06), 0 8px 40px rgba(0,0,0,0.18);
            overflow: hidden;
            animation: iosAlertIn 0.25s cubic-bezier(0.23,1,0.32,1);
        }
        @keyframes iosAlertIn {
            0% { transform: scale(1.08); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .ios-alert-body { padding: 20px 16px 16px; text-align: center; }
        .ios-alert-title { font-size: 17px; font-weight: 600; color: #000; letter-spacing: -0.2px; line-height: 1.3; }
        .ios-alert-msg { font-size: 13px; color: rgba(60,60,67,0.6); line-height: 1.45; margin-top: 4px; }
        .ios-alert-actions { display: flex; flex-direction: column; }
        .ios-alert-actions::before { content: ''; height: 0.5px; background: rgba(60,60,67,0.18); }
        .ios-alert-btn {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            height: 44px; font-size: 17px; color: #007AFF;
            background: none; border: none; cursor: pointer;
            position: relative; -webkit-tap-highlight-color: transparent; transition: background 0.1s;
        }
        .ios-alert-btn:active { background: rgba(0,0,0,0.05); }
        .ios-alert-btn + .ios-alert-btn::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 0.5px; background: rgba(60,60,67,0.18);
        }
        .ios-alert-btn.bold { font-weight: 600; }
        .ios-alert-btn.destructive { color: #FF3B30; }

        /* Bottom Sheet */
        .sheet-mask {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.35); z-index: 90;
            display: none; opacity: 0;
            transition: opacity 0.3s ease;
        }
        .sheet-mask.active { display: block; opacity: 1; }
        .sheet {
            position: fixed; bottom: 0; left: 0; right: 0;
            z-index: 91;
            transform: translateY(100%);
            transition: transform 0.38s cubic-bezier(0.32,0.72,0,1);
        }
        .sheet.open { transform: translateY(0); }
        .sheet-card {
            max-width: 448px; margin: 0 auto;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-radius: 16px 16px 0 0;
            box-shadow: 0 -4px 30px rgba(0,0,0,0.12);
            overflow: hidden;
        }

        /* Join Card */
        .join-card {
            background: white; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            overflow: hidden;
            animation: joinCardIn 0.4s cubic-bezier(0.23,1,0.32,1);
        }
        @keyframes joinCardIn {
            0% { transform: scale(0.92) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* Share Button Animation */
        .share-btn-glow {
            box-shadow: 0 4px 16px rgba(0,122,255,0.35);
        }
        .share-btn-glow:active {
            transform: scale(0.96); opacity: 0.9;
        }

        /* Device card style (matching index.html) */
        .device-card { transition: all 0.2s ease; }
        .device-card:active { transform: scale(0.97); opacity: 0.85; }

        /* Success animation */
        @keyframes successPop {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }
        .success-pop { animation: successPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275); }

        @keyframes checkDraw {
            0% { stroke-dashoffset: 24; }
            100% { stroke-dashoffset: 0; }
        }
        .check-anim path {
            stroke-dasharray: 24; stroke-dashoffset: 24;
            animation: checkDraw 0.4s 0.3s ease forwards;
        }

        /* Toast */
        .toast-bar {
            position: fixed; top: -80px; left: 50%; transform: translateX(-50%);
            z-index: 300; width: calc(100% - 16px); max-width: 400px;
            transition: top 0.45s cubic-bezier(0.34,1.56,0.64,1);
        }
        .toast-bar.visible { top: 52px; }
        .toast-bar-inner {
            background: rgba(30,30,34,0.95);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-radius: 20px; padding: 14px 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.28);
        }

        /* Navigator pills */
        .nav-pill {
            transition: all 0.25s ease;
        }
        .nav-pill.active {
            background: #007AFF; color: white;
            box-shadow: 0 2px 8px rgba(0,122,255,0.3);
        }
    </style>
</head>
<body class="bg-gray-50">

<!-- ====== Navigation Bar (Scene Switcher) ====== -->
<div class="fixed top-0 left-0 right-0 z-50 bg-white/90 backdrop-blur-xl border-b border-gray-100">
    <div class="max-w-md mx-auto px-4 pt-3 pb-2">
        <h1 class="text-sm font-bold text-gray-900 mb-2.5 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            深链邀请 · App端交互模拟
        </h1>
        <div class="flex gap-1.5 overflow-x-auto scroll-hide pb-1">
            <button onclick="showScene('share')" id="navShare" class="nav-pill active text-xs font-bold px-3 py-1.5 rounded-full whitespace-nowrap bg-gray-100 text-gray-500">① 分享入口</button>
            <button onclick="showScene('join')" id="navJoin" class="nav-pill text-xs font-bold px-3 py-1.5 rounded-full whitespace-nowrap bg-gray-100 text-gray-500">② 加入确认</button>
            <button onclick="showScene('success')" id="navSuccess" class="nav-pill text-xs font-bold px-3 py-1.5 rounded-full whitespace-nowrap bg-gray-100 text-gray-500">③ 加入成功</button>
            <button onclick="showScene('joined')" id="navJoined" class="nav-pill text-xs font-bold px-3 py-1.5 rounded-full whitespace-nowrap bg-gray-100 text-gray-500">④ 已加入</button>
            <button onclick="showScene('error')" id="navError" class="nav-pill text-xs font-bold px-3 py-1.5 rounded-full whitespace-nowrap bg-gray-100 text-gray-500">⑤ 异常提示</button>
        </div>
    </div>
</div>

<!-- ====== Phone Frame ====== -->
<div id="app" class="max-w-md mx-auto bg-white relative overflow-hidden" style="margin-top: 88px;">

    <!-- ====== Scene 1: Share Entry (设备详情页 - 分享入口) ====== -->

                客厅

            <span>·</span>
            <span>126 张照片</span>
            <span>·</span>
            <span class="flex items-center gap-1">

                3 位成员

        <!-- Members Section -->

                    <button onclick="openShareSheet()" class="text-xs font-bold text-blue-600 flex items-center gap-1 active:opacity-60">

                        邀请家人
                    </button>
                </div>
                <div class="flex gap-4">
                    <div class="flex flex-col items-center gap-1.5">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-blue-500 to-purple-500 flex items-center justify-center text-white text-sm font-bold shadow-md">我</div>
                        <span class="text-[10px] text-gray-500 font-medium">我</span>
                    </div>
                    <div class="flex flex-col items-center gap-1.5">
                        <div class="w-12 h-12 rounded-full overflow-hidden border border-gray-100 shadow-sm">
                            <img src="https://i.pravatar.cc/100?img=32" class="w-full h-full object-cover">
                        </div>
                        <span class="text-[10px] text-gray-500 font-medium">妈妈</span>
                    </div>
                    <div class="flex flex-col items-center gap-1.5">
                        <div class="w-12 h-12 rounded-full overflow-hidden border border-gray-100 shadow-sm">
                            <img src="https://i.pravatar.cc/100?img=60" class="w-full h-full object-cover">
                        </div>
                        <span class="text-[10px] text-gray-500 font-medium">爸爸</span>
                    </div>
                    <div class="flex flex-col items-center gap-1.5 cursor-pointer active:opacity-60" onclick="openShareSheet()">

                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                        </div>
                        <span class="text-[10px] text-gray-400 font-medium">添加</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Photo Grid Placeholder -->
        <div class="flex-1 px-1 overflow-hidden">
            <div class="grid grid-cols-4 gap-0.5">

                <div class="aspect-square bg-gray-100 overflow-hidden"><img src="https://picsum.photos/seed/f2/200/200" class="w-full h-full object-cover"></div>
                <div class="aspect-square bg-gray-100 overflow-hidden"><img src="https://picsum.photos/seed/f3/200/200" class="w-full h-full object-cover"></div>

                <div class="aspect-square bg-gray-100 overflow-hidden"><img src="https://picsum.photos/seed/f6/200/200" class="w-full h-full object-cover"></div>
                <div class="aspect-square bg-gray-100 overflow-hidden"><img src="https://picsum.photos/seed/f7/200/200" class="w-full h-full object-cover"></div>
                <div class="aspect-square bg-gray-100 overflow-hidden"><img src="https://picsum.photos/seed/f8/200/200" class="w-full h-full object-cover"></div>

        </div>
    </div>

    <!-- ====== Scene 2: Join Confirm (加入相框确认弹窗) ====== -->
    <div id="sceneJoin" class="scene absolute inset-0 hidden">
        <!-- Blurred background -->
        <div class="absolute inset-0 bg-gray-100 overflow-hidden">
            <div class="grid grid-cols-4 gap-0.5 opacity-30 blur-sm">
                <div class="aspect-square bg-gray-200"></div><div class="aspect-square bg-gray-200"></div>
                <div class="aspect-square bg-gray-200"></div><div class="aspect-square bg-gray-200"></div>
                <div class="aspect-square bg-gray-200"></div><div class="aspect-square bg-gray-200"></div>
                <div class="aspect-square bg-gray-200"></div><div class="aspect-square bg-gray-200"></div>
            </div>
        </div>
        <!-- Overlay -->
        <div class="absolute inset-0 bg-black/40 flex items-center justify-center p-6">

                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-xs text-gray-500">加入后你可以</p>
                            <p class="text-sm font-medium text-gray-800 mt-0.5">向此相框发送照片和视频</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 mb-5 p-3 bg-gray-50 rounded-xl">
                        <div class="w-10 h-10 rounded-xl bg-purple-50 flex items-center justify-center flex-shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-xs text-gray-500">同时你还可以</p>
                            <p class="text-sm font-medium text-gray-800 mt-0.5">管理相框设置与所有照片</p>
                        </div>
                    </div>
                    <button onclick="showScene('success')" class="w-full h-12 bg-blue-600 text-white font-bold text-base rounded-xl share-btn-glow transition-all">
                        加入相框
                    </button>
                    <button class="w-full h-10 mt-2 text-gray-400 font-medium text-sm bg-transparent border-none cursor-pointer active:opacity-50">
                        取消
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ====== Scene 3: Already Joined (已加入提示) ====== -->
    <div id="sceneJoined" class="scene absolute inset-0 hidden">
        <div class="absolute inset-0 bg-gray-100 overflow-hidden">
            <div class="grid grid-cols-4 gap-0.5 opacity-30 blur-sm">
                <div class="aspect-square bg-gray-200"></div><div class="aspect-square bg-gray-200"></div>
                <div class="aspect-square bg-gray-200"></div><div class="aspect-square bg-gray-200"></div>

        </div>
        <div class="absolute inset-0 bg-black/40 flex items-center justify-center p-6">

                <h3 class="text-lg font-bold text-gray-900 mb-1">您已加入此相框</h3>
                <p class="text-sm text-gray-400 mb-6">您已经是「客厅相框」的成员，无需重复加入</p>
                <button onclick="showScene('share')" class="w-full h-12 bg-blue-600 text-white font-bold text-base rounded-xl share-btn-glow transition-all">

                </button>
                <button class="w-full h-10 mt-2 text-gray-400 font-medium text-sm bg-transparent border-none cursor-pointer active:opacity-50">
                    关闭
                </button>

        </div>
    </div>

    <!-- ====== Scene 4: Join Success (加入成功) ====== -->
    <div id="sceneSuccess" class="scene absolute inset-0 hidden">
        <div class="absolute inset-0 bg-gray-100 overflow-hidden">
            <div class="grid grid-cols-4 gap-0.5 opacity-30 blur-sm">
                <div class="aspect-square bg-gray-200"></div><div class="aspect-square bg-gray-200"></div>
                <div class="aspect-square bg-gray-200"></div><div class="aspect-square bg-gray-200"></div>
            </div>
        </div>
        <div class="absolute inset-0 bg-black/40 flex items-center justify-center p-6">
            <div class="join-card w-full max-w-[300px] p-8 text-center">

                        <path d="M20 6 9 17l-5-5"/>
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-gray-900 mb-1">加入成功！</h3>
                <p class="text-sm text-gray-400 mb-2">你已成功加入「客厅相框」</p>
                <p class="text-xs text-gray-300 mb-6">现在可以管理相框、发送照片和视频了</p>
                <button onclick="showScene('share')" class="w-full h-12 bg-blue-600 text-white font-bold text-base rounded-xl share-btn-glow transition-all">
                    进入相框

            </div>
        </div>
    </div>

    <!-- ====== Scene 5: Error States (异常提示) ====== -->
    <div id="sceneError" class="scene absolute inset-0 hidden">
        <div class="absolute inset-0 bg-gray-100 overflow-hidden">
            <div class="grid grid-cols-4 gap-0.5 opacity-30 blur-sm">
                <div class="aspect-square bg-gray-200"></div><div class="aspect-square bg-gray-200"></div>
                <div class="aspect-square bg-gray-200"></div><div class="aspect-square bg-gray-200"></div>
            </div>
        </div>
        <div class="absolute inset-0 flex flex-col items-center justify-start pt-16 gap-4 px-6">
            <p class="text-xs font-bold text-gray-400 mb-2 self-start">点击查看不同的异常状态：</p>

            <!-- Error Variant: Expired -->
            <button onclick="showErrorAlert('expired')" class="w-full bg-white rounded-2xl p-4 flex items-center gap-3 shadow-sm border border-gray-100 active:scale-[0.98] transition-transform text-left">
                <div class="w-10 h-10 rounded-full bg-orange-50 flex items-center justify-center flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div>
                    <h4 class="text-sm font-bold text-gray-800">邀请已过期</h4>
                    <p class="text-xs text-gray-400 mt-0.5">Token 超过有效期（24h）</p>
                </div>
            </button>

            <!-- Error Variant: Invalid -->
            <button onclick="showErrorAlert('invalid')" class="w-full bg-white rounded-2xl p-4 flex items-center gap-3 shadow-sm border border-gray-100 active:scale-[0.98] transition-transform text-left">
                <div class="w-10 h-10 rounded-full bg-red-50 flex items-center justify-center flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" x2="9" y1="9" y2="15"/><line x1="9" x2="15" y1="9" y2="15"/></svg>
                </div>
                <div>
                    <h4 class="text-sm font-bold text-gray-800">邀请无效</h4>
                    <p class="text-xs text-gray-400 mt-0.5">Token 不存在或已被撤销</p>
                </div>
            </button>

            <!-- Error Variant: Network -->
            <button onclick="showErrorAlert('network')" class="w-full bg-white rounded-2xl p-4 flex items-center gap-3 shadow-sm border border-gray-100 active:scale-[0.98] transition-transform text-left">
                <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><line x1="2" x2="22" y1="2" y2="22"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.82a15 15 0 0 1 4.17-2.65"/><path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/><path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"/><path d="M5 12.859a10 10 0 0 1 5.17-2.69"/><line x1="12" x2="12.01" y1="20" y2="20"/></svg>
                </div>
                <div>
                    <h4 class="text-sm font-bold text-gray-800">网络异常</h4>
                    <p class="text-xs text-gray-400 mt-0.5">请检查网络连接后重试</p>
                </div>
            </button>
        </div>
    </div>

</div>

<!-- ====== Share Bottom Sheet (分享面板) ====== -->
<div id="shareMask" class="sheet-mask" onclick="closeShareSheet()"></div>
<div id="shareSheet" class="sheet">
    <div class="sheet-card safe-bottom">
        <div class="flex items-center justify-between px-5 pt-4 pb-3">
            <h3 class="text-base font-bold text-gray-900">邀请家人共同管理相框</h3>
            <button onclick="closeShareSheet()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center active:bg-gray-200 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2.5"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div>

        <!-- Link Preview -->
        <div class="mx-5 mb-4 p-3.5 bg-gray-50 rounded-xl flex items-center gap-3">
            <div class="w-9 h-9 rounded-lg bg-blue-50 flex items-center justify-center flex-shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-xs font-bold text-gray-700 truncate">https://92-cn.levect.com/frames/...?token=abc123</p>
                <p class="text-[10px] text-gray-400 mt-0.5">链接有效期 24 小时</p>
            </div>
        </div>

        <!-- Copy Link Button -->
        <div class="px-5 pb-5">
            <button onclick="copyLink()" class="w-full h-12 bg-blue-600 text-white font-bold text-base rounded-xl share-btn-glow transition-all flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                复制邀请链接
            </button>
        </div>
    </div>
</div>

<!-- ====== Error Alert (iOS style) ====== -->
<div id="errorAlert" class="ios-alert-backdrop" onclick="closeErrorAlert()">
    <div class="ios-alert" onclick="event.stopPropagation()">
        <div class="ios-alert-body">
            <div id="errorIcon" class="w-12 h-12 rounded-full mx-auto mb-3 flex items-center justify-center"></div>
            <div class="ios-alert-title" id="errorTitle"></div>
            <div class="ios-alert-msg" id="errorMsg"></div>
        </div>
        <div class="ios-alert-actions" id="errorActions"></div>
    </div>
</div>

<!-- ====== Copy Toast ====== -->
<div id="copyToast" class="toast-bar">
    <div class="toast-bar-inner flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-green-500/20 flex items-center justify-center flex-shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <span class="text-sm font-bold text-white">邀请链接已复制到剪贴板</span>
    </div>
</div>

<script>
    const SCENES = ['share', 'join', 'joined', 'success', 'error'];
    const ERROR_CONFIG = {
        expired: {
            icon: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
            iconBg: 'bg-orange-50',
            title: '邀请已过期',
            msg: '该邀请链接已超过有效期，请联系邀请人重新发送',
            actions: `<button onclick="closeErrorAlert()" class="ios-alert-btn bold">我知道了</button>`
        },
        invalid: {
            icon: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" x2="9" y1="9" y2="15"/><line x1="9" x2="15" y1="9" y2="15"/></svg>`,
            iconBg: 'bg-red-50',
            title: '邀请无效',
            msg: '该邀请链接无效或已被撤销，请确认链接是否正确',
            actions: `<button onclick="closeErrorAlert()" class="ios-alert-btn bold">我知道了</button>`
        },
        network: {
            icon: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><line x1="2" x2="22" y1="2" y2="22"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.82a15 15 0 0 1 4.17-2.65"/><path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/><path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"/><path d="M5 12.859a10 10 0 0 1 5.17-2.69"/><line x1="12" x2="12.01" y1="20" y2="20"/></svg>`,
            iconBg: 'bg-gray-100',
            title: '网络连接失败',
            msg: '无法连接到服务器，请检查网络设置后重试',
            actions: `<button onclick="closeErrorAlert()" class="ios-alert-btn">取消</button><button onclick="closeErrorAlert()" class="ios-alert-btn bold">重试</button>`
        }
    };

    function showScene(name) {
        SCENES.forEach(s => {
            const el = document.getElementById('scene' + s.charAt(0).toUpperCase() + s.slice(1));
            const nav = document.getElementById('nav' + s.charAt(0).toUpperCase() + s.slice(1));
            if (el) el.classList.toggle('hidden', s !== name);
            if (nav) {
                nav.classList.toggle('active', s === name);
                if (s === name) {
                    nav.classList.remove('bg-gray-100', 'text-gray-500');
                } else {
                    nav.classList.add('bg-gray-100', 'text-gray-500');
                }
            }
        });
        closeShareSheet();
        closeErrorAlert();
    }

    function openShareSheet() {
        document.getElementById('shareMask').classList.add('active');
        setTimeout(() => document.getElementById('shareSheet').classList.add('open'), 10);
    }

    function closeShareSheet() {
        document.getElementById('shareSheet').classList.remove('open');
        setTimeout(() => document.getElementById('shareMask').classList.remove('active'), 350);
    }

    function showErrorAlert(type) {
        const cfg = ERROR_CONFIG[type];
        if (!cfg) return;
        const iconEl = document.getElementById('errorIcon');
        iconEl.className = 'w-12 h-12 rounded-full mx-auto mb-3 flex items-center justify-center ' + cfg.iconBg;
        iconEl.innerHTML = cfg.icon;
        document.getElementById('errorTitle').textContent = cfg.title;
        document.getElementById('errorMsg').textContent = cfg.msg;
        document.getElementById('errorActions').innerHTML = cfg.actions;
        document.getElementById('errorAlert').classList.add('active');
    }

    function closeErrorAlert() {
        document.getElementById('errorAlert').classList.remove('active');
    }

    function copyLink() {
        const toast = document.getElementById('copyToast');
        toast.classList.add('visible');
        setTimeout(() => toast.classList.remove('visible'), 2500);
    }
</script>

</body>
</html>
